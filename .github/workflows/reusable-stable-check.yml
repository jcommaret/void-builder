# Job « check » partagé ; appelé par le workflow orchestrateur « stable ».
name: reusable stable check

on:
  workflow_call:
    outputs:
      MS_COMMIT:
        description: Commit Microsoft/VSCodium retenu
        value: ${{ jobs.check.outputs.MS_COMMIT }}
      MS_TAG:
        description: Tag associé
        value: ${{ jobs.check.outputs.MS_TAG }}
      RELEASE_VERSION:
        description: Version release calculée
        value: ${{ jobs.check.outputs.RELEASE_VERSION }}
      SHOULD_BUILD:
        description: "'yes' si un build est nécessaire"
        value: ${{ jobs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY:
        description: "'yes' si déploiement autorisé"
        value: ${{ jobs.check.outputs.SHOULD_DEPLOY }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      MS_COMMIT: ${{ env.MS_COMMIT }}
      MS_TAG: ${{ env.MS_TAG }}
      RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
      SHOULD_BUILD: ${{ env.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ env.SHOULD_DEPLOY }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.GITHUB_BRANCH }}

      - name: Switch to relevant branch
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
        run: ./get_pr.sh

      - name: Clone VSCode repo
        env:
          VOID_COMMIT: ${{ github.event.inputs.void_commit }}
          VOID_RELEASE: ${{ github.event.inputs.void_release }}
        run: ./get_repo.sh

      - name: Check PR or cron
        env:
          GENERATE_ASSETS: ${{ github.event.inputs.generate_assets }}
        run: ./check_cron_or_pr.sh

      - name: Check existing VSCodium tags/releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_ALL: 'yes'
        run: ./check_tags.sh
